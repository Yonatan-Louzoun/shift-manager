<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול משמרות Pro - צוות אונליין</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Rubik', 'sans-serif'] },
                    colors: {
                        primary: { 50: '#eff6ff', 100: '#dbeafe', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f8fafc; -webkit-font-smoothing: antialiased; }
        .tab-btn { position: relative; transition: all 0.3s ease; }
        .tab-active { color: #2563eb; font-weight: 600; }
        .tab-active::after { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 3px; background-color: #3b82f6; border-radius: 3px 3px 0 0; }
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { color: #334155; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDhvtXHqwcUwTKS8C4CG1iAZbeD0_sTi9M",
            authDomain: "shift-manager-307be.firebaseapp.com",
            databaseURL: "https://shift-manager-307be-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "shift-manager-307be",
            storageBucket: "shift-manager-307be.firebasestorage.app",
            messagingSenderId: "765565304046",
            appId: "1:765565304046:web:032581317794a9645cc7ff",
            measurementId: "G-TRN892BWHX"
        };

        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // הפיכת פונקציות מסד הנתונים לזמינות לשאר האתר
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.database = database;
    </script>
    </head>
<body class="text-slate-800">

    <div class="max-w-7xl mx-auto p-4 md:p-8">
        
        <header class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="bg-primary-50 p-3 rounded-xl text-primary-600 relative">
                    <i data-lucide="calendar-clock" class="w-8 h-8"></i>
                    <span class="absolute top-0 right-0 w-3 h-3 bg-emerald-500 border-2 border-white rounded-full animate-pulse"></span>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">מערכת משמרות משותפת</h1>
                    <p class="text-slate-500 text-sm mt-1">מסונכרן בזמן אמת לכל חברי הצוות</p>
                </div>
            </div>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 px-6 pt-4 mb-8 flex gap-8 border-b-2 overflow-x-auto">
            <button onclick="switchTab('constraints')" id="tab-constraints" class="tab-btn tab-active pb-4 px-2 text-lg flex items-center gap-2 whitespace-nowrap">
                <i data-lucide="user-x" class="w-5 h-5"></i>
                אילוצי עובדים
            </button>
            <button onclick="switchTab('schedule')" id="tab-schedule" class="tab-btn tab-inactive pb-4 px-2 text-lg flex items-center gap-2 whitespace-nowrap">
                <i data-lucide="table-2" class="w-5 h-5"></i>
                שיבוץ שבועי
            </button>
            <button onclick="switchTab('calendar')" id="tab-calendar" class="tab-btn tab-inactive pb-4 px-2 text-lg flex items-center gap-2 whitespace-nowrap">
                <i data-lucide="calendar-days" class="w-5 h-5"></i>
                לוח שנה חודשי
            </button>
            <button onclick="switchTab('stats')" id="tab-stats" class="tab-btn tab-inactive pb-4 px-2 text-lg flex items-center gap-2 whitespace-nowrap">
                <i data-lucide="bar-chart-3" class="w-5 h-5"></i>
                סטטיסטיקה
            </button>
        </div>

        <section id="view-constraints" class="block">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                    <div class="w-full lg:w-1/3">
                        <label class="block text-sm font-medium text-slate-700 mb-2">בחר עובד להזנת אילוצים:</label>
                        <select id="empSelect" onchange="renderConstraints()" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-primary-500 focus:border-primary-500 block p-3 shadow-sm transition">
                            <option value="" disabled selected>-- בחר עובד --</option>
                        </select>
                    </div>
                    <div class="flex items-center gap-4 bg-white p-2 rounded-xl shadow-sm border border-slate-200">
                        <button onclick="changeConstraintsWeek(-1)" class="p-2 hover:bg-slate-100 rounded-lg transition text-slate-600">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                        <div class="text-center min-w-[200px]">
                            <span class="block text-sm text-slate-500">שבוע נוכחי</span>
                            <span id="constraintsWeekLabel" class="font-bold text-slate-800"></span>
                        </div>
                        <button onclick="changeConstraintsWeek(1)" class="p-2 hover:bg-slate-100 rounded-lg transition text-slate-600">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div id="noEmpSelected" class="text-center py-16 text-slate-400">
                    <i data-lucide="user-search" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                    <p class="text-lg">אנא בחר איש צוות כדי לצפות ולהזין אילוצים.</p>
                </div>

                <div id="constraintsArea" class="hidden">
                    <div id="constraintsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-7 gap-4"></div>
                </div>
            </div>
        </section>

        <section id="view-schedule" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                    <div class="flex items-center gap-4 bg-slate-50 p-2 rounded-xl border border-slate-200">
                        <button onclick="changeScheduleWeek(-1)" class="p-2 hover:bg-white rounded-lg shadow-sm transition text-slate-600 border border-transparent hover:border-slate-200">
                            <i data-lucide="chevron-right" class="w-5 h-5"></i>
                        </button>
                        <div class="text-center min-w-[220px]">
                            <h2 class="font-bold text-lg text-slate-800" id="scheduleWeekLabel"></h2>
                        </div>
                        <button onclick="changeScheduleWeek(1)" class="p-2 hover:bg-white rounded-lg shadow-sm transition text-slate-600 border border-transparent hover:border-slate-200">
                            <i data-lucide="chevron-left" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                    <table class="w-full text-right text-sm">
                        <thead class="bg-slate-50 text-slate-700 border-b border-slate-200" id="scheduleThead"></thead>
                        <tbody id="scheduleTbody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <section id="view-calendar" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <div class="flex justify-between items-center mb-8 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <button onclick="changeCalendarMonth(-1)" class="flex items-center gap-2 px-4 py-2 hover:bg-white rounded-lg shadow-sm transition text-slate-700 border border-transparent hover:border-slate-200">
                        <i data-lucide="chevron-right" class="w-4 h-4"></i> חודש קודם
                    </button>
                    <h2 class="text-xl font-bold text-slate-800" id="calendarMonthLabel"></h2>
                    <button onclick="changeCalendarMonth(1)" class="flex items-center gap-2 px-4 py-2 hover:bg-white rounded-lg shadow-sm transition text-slate-700 border border-transparent hover:border-slate-200">
                        חודש הבא <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                </div>
                <div class="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-xl overflow-hidden shadow-sm" id="calendarGrid"></div>
            </div>
        </section>

        <section id="view-stats" class="hidden">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
                <div class="flex justify-between items-center mb-8 bg-slate-50 p-3 rounded-xl border border-slate-200">
                    <button onclick="changeStatsMonth(-1)" class="flex items-center gap-2 px-4 py-2 hover:bg-white rounded-lg shadow-sm transition text-slate-700 border border-transparent hover:border-slate-200">
                        <i data-lucide="chevron-right" class="w-4 h-4"></i> חודש קודם
                    </button>
                    <h2 class="text-xl font-bold text-slate-800" id="statsMonthLabel"></h2>
                    <button onclick="changeStatsMonth(1)" class="flex items-center gap-2 px-4 py-2 hover:bg-white rounded-lg shadow-sm transition text-slate-700 border border-transparent hover:border-slate-200">
                        חודש הבא <i data-lucide="chevron-left" class="w-4 h-4"></i>
                    </button>
                </div>

                <div class="overflow-x-auto rounded-xl border border-slate-200 shadow-sm">
                    <table class="w-full text-right text-sm">
                        <thead class="bg-slate-50 text-slate-700 border-b border-slate-200">
                            <tr>
                                <th class="px-4 py-4 font-bold border-l border-slate-200 w-1/4">איש צוות</th>
                                <th class="px-4 py-4 font-bold border-l border-slate-200 text-center w-1/4">סה"כ משמרות בחודש</th>
                                <th class="px-4 py-4 font-bold border-l border-slate-200 text-center w-1/4">משמרות לילה</th>
                                <th class="px-4 py-4 font-bold text-center w-1/4">משמרות סופ"ש (שישי-שבת)</th>
                            </tr>
                        </thead>
                        <tbody id="statsTbody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>
            </div>
        </section>

    </div>

    <!-- מודאל התחברות מנהלת -->
    <div id="managerLoginModal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center z-50 transition-opacity opacity-0">
        <div class="bg-white rounded-2xl shadow-xl p-8 max-w-md w-full mx-4 transform scale-95 transition-transform duration-300" id="managerLoginModalContent">
            <div class="w-12 h-12 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="lock" class="w-6 h-6"></i>
            </div>
            <h3 class="text-xl font-bold text-center text-slate-900 mb-2">אזור מנהלת (זוהר)</h3>
            <p class="text-slate-500 text-center mb-6">אנא הזיני סיסמת מנהל כדי לצפות בסטטיסטיקות הצוות.</p>
            <input type="password" id="managerPassword" class="w-full bg-slate-50 border border-slate-300 text-slate-900 rounded-xl focus:ring-indigo-500 focus:border-indigo-500 block p-3 mb-6 text-center text-lg tracking-widest" placeholder="סיסמה">
            <div class="flex gap-4">
                <button onclick="hideManagerModal()" class="flex-1 px-4 py-3 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-medium transition">ביטול</button>
                <button onclick="verifyManager()" class="flex-1 px-4 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-medium transition shadow-sm">כניסה למערכת</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 bg-slate-900 text-white px-6 py-4 rounded-xl shadow-2xl flex items-center gap-3 z-50 hidden transition-all duration-300 transform translate-y-full opacity-0">
        <i data-lucide="check-circle-2" class="w-5 h-5 text-emerald-400"></i>
        <span id="toastMsg" class="font-medium"></span>
    </div>

    <script>
        // --- Data & Constants ---
        const employees = ['שירה', 'בר', 'שי', 'מיקה', 'אגם', 'עמוס', 'יצחק', 'עומר', 'יובל', 'מיכאל'];
        const shifts = [
            { id: 'morning', name: 'בוקר', time: '07:00-15:00', icon: 'sunrise' },
            { id: 'afternoon', name: 'צהריים', time: '15:00-23:00', icon: 'sun' },
            { id: 'night', name: 'לילה', time: '23:00-07:00', icon: 'moon' }
        ];
        const dayNames = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
        const monthNames = ['ינואר', 'פברואר', 'מרץ', 'אפריל', 'מאי', 'יוני', 'יולי', 'אוגוסט', 'ספטמבר', 'אוקטובר', 'נובמבר', 'דצמבר'];

        // --- State ---
        let db = { constraints: {}, schedule: {} };
        let currentConstraintsDate = getStartOfWeek(new Date());
        let currentScheduleDate = getStartOfWeek(new Date());
        let currentCalendarDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
        let currentStatsDate = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
        let isManagerUnlocked = false; // האם המנהלת מחוברת כרגע

        // --- Firebase Sync Methods ---
        function saveData() {
            if (window.dbSet && window.dbRef && window.database) {
                window.dbSet(window.dbRef(window.database, 'shift_data'), db);
            }
        }

        function listenForChanges() {
            if (window.dbOnValue && window.dbRef && window.database) {
                const dataRef = window.dbRef(window.database, 'shift_data');
                window.dbOnValue(dataRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        db = data; 
                    } else {
                        db = { constraints: {}, schedule: {} };
                    }
                    updateAllViews(); 
                });
            }
        }

        // --- Init ---
        function init() {
            lucide.createIcons();
            populateEmployees();
            
            // במקום לטעון מהדפדפן, אנחנו מאזינים לענן
            listenForChanges();
        }

        // --- Utils ---
        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day;
            return new Date(d.getFullYear(), d.getMonth(), diff);
        }

        function formatDateKey(date) {
            const d = new Date(date);
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function formatDateDisplay(date) {
            return `${String(date.getDate()).padStart(2, '0')}/${String(date.getMonth() + 1).padStart(2, '0')}`;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.remove('translate-y-full', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-full', 'opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 2500);
        }

        // --- Manager Auth Logic ---
        function showManagerModal() {
            const modal = document.getElementById('managerLoginModal');
            const content = document.getElementById('managerLoginModalContent');
            document.getElementById('managerPassword').value = '';
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        function hideManagerModal() {
            const modal = document.getElementById('managerLoginModal');
            const content = document.getElementById('managerLoginModalContent');
            modal.classList.add('opacity-0');
            content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        function verifyManager() {
            const pwd = document.getElementById('managerPassword').value;
            // כאן מגדירים את הסיסמה של זוהר
            if (pwd === '0810') { 
                isManagerUnlocked = true;
                hideManagerModal();
                showToast('התחברת בהצלחה, זוהר');
                switchTab('stats', true); // כניסה מאולצת לטאב אחרי אישור
            } else {
                showToast('סיסמה שגויה!');
                document.getElementById('managerPassword').value = '';
            }
        }

        // --- UI Navigation ---
        function switchTab(tabId, bypassAuth = false) {
            // חסימת הגישה לסטטיסטיקה אם לא מחוברים
            if (tabId === 'stats' && !isManagerUnlocked && !bypassAuth) {
                showManagerModal();
                return; // עוצר את המעבר לטאב
            }

            ['constraints', 'schedule', 'calendar', 'stats'].forEach(t => {
                document.getElementById(`tab-${t}`).className = 'tab-btn tab-inactive pb-4 px-2 text-lg flex items-center gap-2 whitespace-nowrap';
                document.getElementById(`view-${t}`).classList.add('hidden');
            });
            document.getElementById(`tab-${tabId}`).className = 'tab-btn tab-active pb-4 px-2 text-lg flex items-center gap-2 whitespace-nowrap';
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            updateAllViews();
        }

        function updateAllViews() {
            if (!document.getElementById('view-constraints').classList.contains('hidden')) renderConstraints();
            if (!document.getElementById('view-schedule').classList.contains('hidden')) renderSchedule();
            if (!document.getElementById('view-calendar').classList.contains('hidden')) renderCalendar();
            if (!document.getElementById('view-stats').classList.contains('hidden')) renderStats();
            lucide.createIcons();
        }

        // --- Constraints Logic ---
        function populateEmployees() {
            const select = document.getElementById('empSelect');
            employees.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp;
                opt.textContent = emp;
                select.appendChild(opt);
            });
        }

        function changeConstraintsWeek(offset) {
            currentConstraintsDate.setDate(currentConstraintsDate.getDate() + (offset * 7));
            renderConstraints();
            lucide.createIcons();
        }

        function renderConstraints() {
            const emp = document.getElementById('empSelect').value;
            const noEmp = document.getElementById('noEmpSelected');
            const area = document.getElementById('constraintsArea');
            const grid = document.getElementById('constraintsGrid');
            const label = document.getElementById('constraintsWeekLabel');

            const endOfWeek = new Date(currentConstraintsDate);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            label.textContent = `${formatDateDisplay(currentConstraintsDate)} - ${formatDateDisplay(endOfWeek)}`;

            if (!emp) {
                noEmp.classList.remove('hidden');
                area.classList.add('hidden');
                return;
            }

            noEmp.classList.add('hidden');
            area.classList.remove('hidden');
            grid.innerHTML = '';

            const empConstraints = (db.constraints && db.constraints[emp]) || [];

            for (let i = 0; i < 7; i++) {
                const currentDate = new Date(currentConstraintsDate);
                currentDate.setDate(currentDate.getDate() + i);
                const dateKey = formatDateKey(currentDate);

                const dayCard = document.createElement('div');
                dayCard.className = 'bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden flex flex-col';
                
                const isToday = dateKey === formatDateKey(new Date());
                const headerClass = isToday ? 'bg-primary-50 border-b border-primary-100' : 'bg-slate-50 border-b border-slate-200';
                
                dayCard.innerHTML = `
                    <div class="${headerClass} p-3 text-center">
                        <div class="font-bold text-slate-800">${dayNames[i]}</div>
                        <div class="text-xs text-slate-500">${formatDateDisplay(currentDate)}</div>
                    </div>
                    <div class="p-3 flex-1 flex flex-col gap-2"></div>
                `;
                
                const shiftsContainer = dayCard.querySelector('.p-3.flex-1');

                shifts.forEach(shift => {
                    const shiftFullKey = `${dateKey}_${shift.id}`;
                    const isChecked = empConstraints.includes(shiftFullKey);
                    
                    const label = document.createElement('label');
                    label.className = `flex items-center p-2 rounded-lg cursor-pointer transition border ${isChecked ? 'bg-red-50 border-red-200' : 'bg-white border-slate-100 hover:bg-slate-50'}`;
                    
                    label.innerHTML = `
                        <input type="checkbox" class="w-4 h-4 text-red-500 rounded border-slate-300 focus:ring-red-500 ml-3" 
                            ${isChecked ? 'checked' : ''} 
                            onchange="toggleConstraint('${emp}', '${shiftFullKey}', this.checked)">
                        <div class="flex-1">
                            <div class="text-sm font-semibold ${isChecked ? 'text-red-700' : 'text-slate-700'} flex items-center gap-1">
                                <i data-lucide="${shift.icon}" class="w-3 h-3"></i> ${shift.name}
                            </div>
                        </div>
                    `;
                    shiftsContainer.appendChild(label);
                });
                grid.appendChild(dayCard);
            }
        }

        function toggleConstraint(emp, shiftFullKey, isChecked) {
            if (!db.constraints) db.constraints = {};
            if (!db.constraints[emp]) db.constraints[emp] = [];
            
            if (isChecked) {
                if (!db.constraints[emp].includes(shiftFullKey)) db.constraints[emp].push(shiftFullKey);
            } else {
                db.constraints[emp] = db.constraints[emp].filter(k => k !== shiftFullKey);
            }
            saveData();
        }

        // --- Schedule Logic ---
        function changeScheduleWeek(offset) {
            currentScheduleDate.setDate(currentScheduleDate.getDate() + (offset * 7));
            renderSchedule();
            lucide.createIcons();
        }

        function renderSchedule() {
            const thead = document.getElementById('scheduleThead');
            const tbody = document.getElementById('scheduleTbody');
            const label = document.getElementById('scheduleWeekLabel');

            const endOfWeek = new Date(currentScheduleDate);
            endOfWeek.setDate(endOfWeek.getDate() + 6);
            label.textContent = `${formatDateDisplay(currentScheduleDate)} - ${formatDateDisplay(endOfWeek)}`;

            thead.innerHTML = '';
            const trHead = document.createElement('tr');
            trHead.innerHTML = `<th class="px-4 py-4 font-bold border-l border-slate-200 w-32 sticky right-0 bg-slate-50 shadow-[1px_0_0_0_#e2e8f0] z-10">משמרת</th>`;
            
            for(let i=0; i<7; i++) {
                const currentDate = new Date(currentScheduleDate);
                currentDate.setDate(currentDate.getDate() + i);
                const isToday = formatDateKey(currentDate) === formatDateKey(new Date());
                
                trHead.innerHTML += `
                    <th class="px-2 py-4 border-l border-slate-200 text-center min-w-[140px] ${isToday ? 'bg-primary-50 text-primary-700' : ''}">
                        <div class="font-bold text-base">${dayNames[i]}</div>
                        <div class="text-xs font-normal opacity-70 mt-1">${formatDateDisplay(currentDate)}</div>
                    </th>
                `;
            }
            thead.appendChild(trHead);

            tbody.innerHTML = '';
            shifts.forEach(shift => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50/50 transition-colors';
                
                tr.innerHTML = `
                    <td class="px-4 py-5 font-bold border-l border-slate-100 sticky right-0 bg-white shadow-[1px_0_0_0_#f1f5f9] z-10">
                        <div class="flex items-center gap-2 text-slate-800">
                            <div class="p-1.5 bg-slate-100 rounded-lg text-slate-600"><i data-lucide="${shift.icon}" class="w-4 h-4"></i></div>
                            ${shift.name}
                        </div>
                        <div class="text-xs text-slate-400 font-normal mt-1 mr-9">${shift.time}</div>
                    </td>
                `;

                for(let i=0; i<7; i++) {
                    const currentDate = new Date(currentScheduleDate);
                    currentDate.setDate(currentDate.getDate() + i);
                    const dateKey = formatDateKey(currentDate);
                    const shiftFullKey = `${dateKey}_${shift.id}`;
                    
                    if (!db.schedule) db.schedule = {};
                    const currentAssigned = db.schedule[shiftFullKey] || '';
                    
                    let hasConflict = false;
                    if (currentAssigned && db.constraints && db.constraints[currentAssigned] && db.constraints[currentAssigned].includes(shiftFullKey)) {
                        hasConflict = true;
                    }

                    const td = document.createElement('td');
                    td.className = `p-3 border-l border-slate-100 align-top transition-colors ${hasConflict ? 'bg-red-50/50' : currentAssigned ? 'bg-emerald-50/30' : ''}`;
                    
                    const select = document.createElement('select');
                    select.className = `w-full p-2.5 text-sm rounded-xl border outline-none transition-all shadow-sm cursor-pointer
                        ${hasConflict ? 'border-red-300 text-red-700 bg-red-50 focus:ring-2 focus:ring-red-200' : 
                          currentAssigned ? 'border-emerald-200 text-emerald-800 bg-emerald-50 focus:ring-2 focus:ring-emerald-200' : 
                          'border-slate-200 text-slate-700 bg-white focus:border-primary-400 focus:ring-2 focus:ring-primary-100 hover:border-slate-300'}`;
                    
                    select.onchange = (e) => updateSchedule(shiftFullKey, e.target.value);

                    let optionsHtml = `<option value="">-- פנוי --</option>`;
                    employees.forEach(emp => {
                        const empHasConstraint = db.constraints && db.constraints[emp] && db.constraints[emp].includes(shiftFullKey);
                        const selected = currentAssigned === emp ? 'selected' : '';
                        const constraintMark = empHasConstraint ? ' ❌ (אילוץ)' : '';
                        optionsHtml += `<option value="${emp}" ${selected}>${emp}${constraintMark}</option>`;
                    });
                    select.innerHTML = optionsHtml;
                    
                    td.appendChild(select);

                    if (hasConflict) {
                        const warning = document.createElement('div');
                        warning.className = 'text-xs text-red-600 mt-2 font-medium flex items-center gap-1 justify-center bg-red-100/50 py-1 rounded-md';
                        warning.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3"></i> אילוץ מוזן`;
                        td.appendChild(warning);
                    }
                    tr.appendChild(td);
                }
                tbody.appendChild(tr);
            });
        }

        function updateSchedule(shiftFullKey, employee) {
            if (!db.schedule) db.schedule = {};
            if (employee === '') {
                delete db.schedule[shiftFullKey];
            } else {
                db.schedule[shiftFullKey] = employee;
            }
            saveData();
            showToast('השיבוץ הסתנכרן לענן');
        }

        // --- Calendar Logic ---
        function changeCalendarMonth(offset) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
            renderCalendar();
            lucide.createIcons();
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const label = document.getElementById('calendarMonthLabel');
            const year = currentCalendarDate.getFullYear();
            const month = currentCalendarDate.getMonth();
            
            label.textContent = `${monthNames[month]} ${year}`;

            // Reset grid
            grid.innerHTML = `
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">ראשון</div>
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">שני</div>
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">שלישי</div>
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">רביעי</div>
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">חמישי</div>
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">שישי</div>
                <div class="bg-slate-50 py-3 text-center font-semibold text-slate-700">שבת</div>
            `;

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            for (let i = 0; i < firstDayOfMonth; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'bg-slate-50 min-h-[120px] p-2';
                grid.appendChild(emptyCell);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateKey = formatDateKey(date);
                const isToday = dateKey === formatDateKey(new Date());

                const cell = document.createElement('div');
                cell.className = `min-h-[120px] p-2 bg-white flex flex-col gap-1 hover:bg-slate-50 transition cursor-default ${isToday ? 'ring-2 ring-inset ring-primary-500' : ''}`;
                
                const dayHeader = document.createElement('div');
                dayHeader.className = `text-sm font-semibold mb-2 ${isToday ? 'text-primary-600 bg-primary-50 w-8 h-8 rounded-full flex items-center justify-center' : 'text-slate-500'}`;
                dayHeader.textContent = day;
                cell.appendChild(dayHeader);

                shifts.forEach(shift => {
                    const shiftFullKey = `${dateKey}_${shift.id}`;
                    if(db.schedule && db.schedule[shiftFullKey]) {
                        const assigned = db.schedule[shiftFullKey];
                        const shiftDiv = document.createElement('div');
                        
                        let bgColor = 'bg-slate-100 text-slate-700';
                        if (shift.id === 'morning') bgColor = 'bg-amber-50 text-amber-700 border border-amber-100';
                        if (shift.id === 'afternoon') bgColor = 'bg-orange-50 text-orange-700 border border-orange-100';
                        if (shift.id === 'night') bgColor = 'bg-indigo-50 text-indigo-700 border border-indigo-100';
                        
                        if (db.constraints && db.constraints[assigned] && db.constraints[assigned].includes(shiftFullKey)) {
                             bgColor = 'bg-red-100 text-red-800 border border-red-200 font-bold';
                        }

                        shiftDiv.className = `text-xs p-1.5 rounded-md flex items-center justify-between ${bgColor}`;
                        shiftDiv.innerHTML = `<span class="truncate pr-1">${assigned}</span><i data-lucide="${shift.icon}" class="w-3 h-3 opacity-70"></i>`;
                        cell.appendChild(shiftDiv);
                    }
                });

                // הצגת אילוצים בלוח השנה בתחתית התא
                const constraintsByEmp = {};
                employees.forEach(emp => {
                    const empShifts = [];
                    shifts.forEach(shift => {
                        const shiftFullKey = `${dateKey}_${shift.id}`;
                        if (db.constraints && db.constraints[emp] && db.constraints[emp].includes(shiftFullKey)) {
                            empShifts.push(shift.name.charAt(0) + "'");
                        }
                    });
                    if (empShifts.length > 0) {
                        constraintsByEmp[emp] = empShifts;
                    }
                });
                
                const empNames = Object.keys(constraintsByEmp);
                if (empNames.length > 0) {
                    const constraintsWrapper = document.createElement('div');
                    constraintsWrapper.className = 'mt-auto pt-2 border-t border-slate-100 flex flex-col gap-1';
                    
                    const constraintsTitle = document.createElement('div');
                    constraintsTitle.className = 'text-[10px] text-slate-400 font-medium mb-0.5';
                    constraintsTitle.textContent = 'אילוצים:';
                    constraintsWrapper.appendChild(constraintsTitle);
                    
                    empNames.forEach(emp => {
                        const empShifts = constraintsByEmp[emp];
                        const shiftsText = empShifts.length === shifts.length ? 'הכל' : empShifts.join(',');
                        const cDiv = document.createElement('div');
                        cDiv.className = 'text-[10px] px-1.5 py-1 rounded bg-slate-50 text-slate-600 border border-slate-200 flex items-center justify-between w-full';
                        cDiv.innerHTML = `
                            <div class="flex items-center gap-1.5 truncate">
                                <i data-lucide="user-x" class="w-3 h-3 text-red-400 shrink-0"></i>
                                <span class="truncate">${emp}</span>
                            </div>
                            <span class="text-[9px] text-slate-400 font-medium shrink-0 mr-1">${shiftsText}</span>
                        `;
                        constraintsWrapper.appendChild(cDiv);
                    });
                    
                    cell.appendChild(constraintsWrapper);
                }

                grid.appendChild(cell);
            }
            
            const totalCells = firstDayOfMonth + daysInMonth;
            const remainingCells = (7 - (totalCells % 7)) % 7;
            for (let i = 0; i < remainingCells; i++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'bg-slate-50 min-h-[120px] p-2';
                grid.appendChild(emptyCell);
            }
        }

        // --- Stats Logic ---
        function changeStatsMonth(offset) {
            currentStatsDate.setMonth(currentStatsDate.getMonth() + offset);
            renderStats();
            lucide.createIcons();
        }

        function renderStats() {
            const tbody = document.getElementById('statsTbody');
            const label = document.getElementById('statsMonthLabel');
            const year = currentStatsDate.getFullYear();
            const month = currentStatsDate.getMonth();
            
            label.textContent = `${monthNames[month]} ${year}`;
            tbody.innerHTML = '';

            // יצירת אובייקט לאיסוף הנתונים לכל עובד
            const stats = {};
            employees.forEach(emp => {
                stats[emp] = { total: 0, nights: 0, weekends: 0 };
            });

            // ריצה על כל ימי החודש ובדיקת המשמרות
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let day = 1; day <= daysInMonth; day++) {
                const date = new Date(year, month, day);
                const dateKey = formatDateKey(date);
                const dayOfWeek = date.getDay(); // 5 = שישי, 6 = שבת

                shifts.forEach(shift => {
                    const shiftFullKey = `${dateKey}_${shift.id}`;
                    if (db.schedule && db.schedule[shiftFullKey]) {
                        const emp = db.schedule[shiftFullKey];
                        if (stats[emp]) {
                            stats[emp].total++;
                            if (shift.id === 'night') stats[emp].nights++;
                            
                            // ספירת סופ"ש: כל שבת, או שישי צהריים/לילה בלבד
                            if (dayOfWeek === 6 || (dayOfWeek === 5 && (shift.id === 'afternoon' || shift.id === 'night'))) {
                                stats[emp].weekends++;
                            }
                        }
                    }
                });
            }

            // ציור הטבלה
            employees.forEach(emp => {
                const s = stats[emp];
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors';
                
                // עיצוב תנאי: אם המספר גדול מ-0 הוא מודגש עם רקע חלש, אם זה 0 הוא אפור ודהוי
                const totalClass = s.total > 0 ? 'font-bold text-primary-700 bg-primary-50/50' : 'text-slate-400';
                const nightsClass = s.nights > 0 ? 'font-semibold text-indigo-700 bg-indigo-50/50' : 'text-slate-400';
                const weekendsClass = s.weekends > 0 ? 'font-semibold text-emerald-700 bg-emerald-50/50' : 'text-slate-400';

                tr.innerHTML = `
                    <td class="px-4 py-4 font-semibold text-slate-800 border-l border-slate-100">${emp}</td>
                    <td class="px-4 py-4 text-center border-l border-slate-100 ${totalClass}">${s.total}</td>
                    <td class="px-4 py-4 text-center border-l border-slate-100 ${nightsClass}">${s.nights}</td>
                    <td class="px-4 py-4 text-center ${weekendsClass}">${s.weekends}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Start
        window.onload = init;
    </script>
</body>
</html>
